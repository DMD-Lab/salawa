name: dmdlab_salawa
description: Salawa — Radio islamique & horaires de prière — DMD Lab
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.0.0

  # Fonts
  google_fonts: ^6.2.1

  # Radio
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  audio_service: ^0.18.18
  audio_session: ^0.1.24

  # Utils
  intl: ^0.19.0
  http: ^1.2.2
  shared_preferences: ^2.3.3
  google_generative_ai: ^0.4.7
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# --- Icône d'app ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/salawa_logo_white.png"
  adaptive_icon_background: "#13411B"
  adaptive_icon_foreground: "assets/images/salawa_logo_white.png"
  min_sdk_android: 21
  web:
    generate: false

# --- Splash screen natif ---
flutter_native_splash:
  color: "#13411B"
  color_dark: "#13411B"
  image: assets/images/salawa_logo_white.png
  android_12:
    color: "#13411B"
    image: assets/images/salawa_logo_white.png
  fullscreen: false
